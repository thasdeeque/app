<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SBO HI">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#007bff">
    <link rel="manifest" href="manifest.json">
    <title>SBO HI APP</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
            overflow: hidden; /* Prevents scrolling for app-like feel */
        }

        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }

        .maintenance-icon {
            font-size: 60px;
            display: inline-block;
            margin-bottom: 20px;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 22px;
            color: #007bff;
            margin-bottom: 15px;
        }

        p {
            font-size: 16px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .status-pill {
            display: inline-block;
            background-color: #007bff;
            color: #ffffff;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="maintenance-icon">⚙️</div>
        <h1>SBO HI is under maintenance</h1>
        <p>We are currently updating the app to provide a better experience. We will be back shortly.</p>
        <div class="status-pill">Be right back!</div>
    </div>

</body>
</html>
